<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quiz Z.23 / MS.21 — pełny test</title>
<style>
:root {
  --bg:#0b1220; --card:#111827; --card2:#172033; --text:#f8fafc; --muted:#cbd5e1;
  --accent:#38bdf8; --ok:#22c55e; --bad:#ef4444; --warn:#f59e0b; --border:#334155;
}
* { box-sizing:border-box; }
body {
  margin:0; font-family:Arial,Helvetica,sans-serif; color:var(--text);
  background:linear-gradient(180deg,#07111f,#0f172a);
}
.wrap { max-width:1000px; margin:0 auto; padding:16px; }
.card {
  background:rgba(17,24,39,.96); border:1px solid var(--border); border-radius:18px;
  padding:18px; box-shadow:0 10px 30px rgba(0,0,0,.25);
}
h1 { margin:0 0 8px; font-size:1.55rem; }
.sub { color:var(--muted); line-height:1.45; margin-bottom:16px; }
.toolbar { display:flex; flex-wrap:wrap; gap:10px; margin:14px 0 18px; }
button, select {
  border:1px solid var(--border); border-radius:12px; padding:12px 14px;
  background:var(--card2); color:var(--text); font-size:1rem; cursor:pointer;
}
button.primary { background:var(--accent); color:#072235; border:none; font-weight:700; }
button.good { background:var(--ok); color:#06240f; border:none; font-weight:700; }
button.warn { background:var(--warn); color:#2b1800; border:none; font-weight:700; }
.stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin:12px 0 18px; }
.stat { background:#0f172a; border:1px solid var(--border); border-radius:14px; padding:12px; }
.n { font-size:1.35rem; font-weight:700; }
.progress { width:100%; height:10px; background:#0b1220; border:1px solid var(--border); border-radius:999px; overflow:hidden; margin:12px 0 18px; }
.bar { width:0; height:100%; background:var(--accent); transition:width .2s; }
.meta { display:flex; flex-wrap:wrap; gap:12px; color:var(--muted); margin-bottom:10px; }
.qimgWrap { background:white; border-radius:16px; padding:12px; margin:10px 0 16px; }
.qimg { display:block; width:100%; height:auto; border-radius:10px; }
.answers { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.ans { padding:14px 12px; text-align:center; font-weight:700; font-size:1.05rem; }
.ans.correct { background:rgba(34,197,94,.16); border-color:var(--ok); }
.ans.wrong { background:rgba(239,68,68,.14); border-color:var(--bad); }
.ans.locked { opacity:.88; }
.feedback {
  margin-top:14px; padding:12px 14px; border-radius:14px; border:1px solid var(--border);
  background:#0f172a; line-height:1.45;
}
.feedback.ok { border-color:rgba(34,197,94,.55); background:rgba(34,197,94,.12); }
.feedback.bad { border-color:rgba(239,68,68,.55); background:rgba(239,68,68,.10); }
.nav { display:flex; justify-content:space-between; gap:10px; margin-top:18px; }
.hidden { display:none; }
.small { color:var(--muted); font-size:.95rem; }
.overview { display:grid; grid-template-columns:repeat(auto-fill,minmax(58px,1fr)); gap:8px; margin-top:16px; }
.cell {
  border:1px solid var(--border); background:#0f172a; color:var(--text); border-radius:12px; padding:12px 6px; font-weight:700;
}
.cell.ok { background:rgba(34,197,94,.16); border-color:rgba(34,197,94,.55); }
.cell.bad { background:rgba(239,68,68,.14); border-color:rgba(239,68,68,.55); }
.note {
  color:#fde68a; background:rgba(120,53,15,.25); border:1px solid rgba(253,224,71,.35);
  border-radius:14px; padding:12px 14px; line-height:1.45; margin-top:16px;
}
@media (max-width:700px) {
  .answers { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>Quiz Z.23 / MS.21 — pełny test</h1>
    <div class="sub">
      W tej wersji pytanie jest pokazane jako obraz wycięty z oryginalnego arkusza, więc zawsze widać pełną treść oraz odpowiedzi.
      Po kliknięciu odpowiedzi od razu pokazuje się odpowiedź prawidłowa.
    </div>

    <div class="stats">
      <div class="stat"><div class="n">12</div><div>arkuszy</div></div>
      <div class="stat"><div class="n">480</div><div>pytań łącznie</div></div>
      <div class="stat"><div class="n">40</div><div>pytań na arkusz</div></div>
    </div>

    <div class="toolbar">
      <select id="setSelect"></select>
      <button class="primary" onclick="startSet()">Start wybranego arkusza</button>
      <button class="warn" onclick="startMixed()">Losowy miks wszystkich</button>
      <button onclick="showOverview()">Przegląd odpowiedzi</button>
    </div>

    <div id="quizBox" class="hidden">
      <div class="meta">
        <div id="setName"></div>
        <div id="counter"></div>
        <div id="score"></div>
      </div>
      <div class="progress"><div id="bar" class="bar"></div></div>
      <div class="qimgWrap"><img id="qimg" class="qimg" alt="Pytanie" /></div>

      <div class="answers">
        <button class="ans" id="btnA" onclick="choose('A')">A</button>
        <button class="ans" id="btnB" onclick="choose('B')">B</button>
        <button class="ans" id="btnC" onclick="choose('C')">C</button>
        <button class="ans" id="btnD" onclick="choose('D')">D</button>
      </div>

      <div id="feedback" class="feedback hidden"></div>

      <div class="nav">
        <button onclick="prevQ()">Poprzednie</button>
        <button class="good" onclick="nextQ()">Następne</button>
      </div>

    </div>

    <div id="overviewBox" class="hidden">
      <div class="meta">
        <div id="overviewName"></div>
        <div id="overviewScore"></div>
      </div>
      <div id="overviewGrid" class="overview"></div>
    </div>
  </div>
</div>

const SET_LIST = [{"name": "MS.21 2020 czerwiec", "count": 40}, {"name": "Z.23 2013 pazdziernik", "count": 40}, {"name": "Z.23 2014 czerwiec", "count": 40}, {"name": "Z.23 2014 styczen", "count": 40}, {"name": "Z.23 2015 czerwiec", "count": 40}, {"name": "Z.23 2015 styczen", "count": 40}, {"name": "Z.23 2015 wrzesien", "count": 40}, {"name": "Z.23 2016 czerwiec", "count": 40}, {"name": "Z.23 2017 maj", "count": 40}, {"name": "Z.23 2018 maj", "count": 40}, {"name": "Z.23 2019 maj", "count": 40}, {"name": "Z.23 2020 czerwiec", "count": 40}];
let active = [];
let current = 0;
let chosenMap = {};
let activeName = "";

function init() {
  const sel = document.getElementById("setSelect");
  SET_LIST.forEach((s, idx) => {
    const opt = document.createElement("option");
    opt.value = s.name;
    opt.textContent = s.name + " (" + s.count + " pytań)";
    sel.appendChild(opt);
  });
}
init();

function startSet() {
  activeName = document.getElementById("setSelect").value;
  active = JSON.parse(JSON.stringify(SETS[activeName]));
  current = 0;
  chosenMap = {};
  document.getElementById("overviewBox").classList.add("hidden");
  document.getElementById("quizBox").classList.remove("hidden");
  render();
}

function startMixed() {
  activeName = "Losowy miks ze wszystkich arkuszy";
  active = [];
  Object.keys(SETS).forEach(name => {
    active.push(...JSON.parse(JSON.stringify(SETS[name])));
  });
  shuffle(active);
  current = 0;
  chosenMap = {};
  document.getElementById("overviewBox").classList.add("hidden");
  document.getElementById("quizBox").classList.remove("hidden");
  render();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function render() {
  const q = active[current];
  if (!q) return;
  document.getElementById("setName").textContent = activeName + " • źródło: " + q.source;
  document.getElementById("counter").textContent = "Pytanie " + (current + 1) + " / " + active.length + " • nr w arkuszu: " + q.number;
  const answered = Object.keys(chosenMap).length;
  const ok = Object.values(chosenMap).filter(v => v.ok).length;
  document.getElementById("score").textContent = "Wynik: " + ok + " / " + answered;
  document.getElementById("bar").style.width = (((current + 1) / active.length) * 100) + "%";
  document.getElementById("qimg").src = q.image + "?v=" + q.number;

  ["A","B","C","D"].forEach(letter => {
    const btn = document.getElementById("btn" + letter);
    btn.className = "ans";
    btn.disabled = false;
    if (chosenMap[current]) {
      btn.classList.add("locked");
      if (letter === q.correct) btn.classList.add("correct");
      if (letter === chosenMap[current].selected && letter !== q.correct) btn.classList.add("wrong");
    }
  });

  const fb = document.getElementById("feedback");
  fb.className = "feedback hidden";
  fb.textContent = "";
  if (chosenMap[current]) {
    fb.className = "feedback " + (chosenMap[current].ok ? "ok" : "bad");
    fb.innerHTML = chosenMap[current].ok
      ? "Dobrze. Prawidłowa odpowiedź: <b>" + q.correct + "</b>."
      : "Nie. Prawidłowa odpowiedź: <b>" + q.correct + "</b>.";
  }
}

function choose(letter) {
  const q = active[current];
  chosenMap[current] = { selected: letter, ok: letter === q.correct };
  render();
}

function nextQ() {
  if (current < active.length - 1) {
    current++;
    render();
  } else {
    showOverview();
  }
}

function prevQ() {
  if (current > 0) {
    current--;
    render();
  }
}

function showOverview() {
  document.getElementById("quizBox").classList.add("hidden");
  document.getElementById("overviewBox").classList.remove("hidden");
  document.getElementById("overviewName").textContent = activeName;
  const answered = Object.keys(chosenMap).length;
  const ok = Object.values(chosenMap).filter(v => v.ok).length;
  document.getElementById("overviewScore").textContent = "Wynik: " + ok + " / " + answered;
  const grid = document.getElementById("overviewGrid");
  grid.innerHTML = "";
  active.forEach((q, idx) => {
    const b = document.createElement("button");
    b.className = "cell";
    if (chosenMap[idx]) b.classList.add(chosenMap[idx].ok ? "ok" : "bad");
    b.textContent = idx + 1;
    b.onclick = () => {
      current = idx;
      document.getElementById("overviewBox").classList.add("hidden");
      document.getElementById("quizBox").classList.remove("hidden");
      render();
    };
    grid.appendChild(b);
  });
}
